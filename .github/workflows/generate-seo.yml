name: Generate Programmatic SEO Content

on:
  # Weekly auto-generation is PAUSED. Google was not indexing the bulk
  # programmatic pages (thin/templated content), so we pruned to a focused,
  # offer-aligned set and stopped auto-adding more. Run manually from the
  # Actions tab if you ever want to regenerate the curated outcomes.
  # schedule:
  #   - cron: '0 0 * * 0'
  workflow_dispatch: # Manual trigger only

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate SEO content
        env:
          # Script was migrated from Gemini to Claude; it reads ANTHROPIC_API_KEY
          # and AUDIT_CLAUDE_MODEL. Sonnet for bulk SEO: ~5x cheaper than Opus,
          # far faster, negligible quality drop for templated pages.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AUDIT_CLAUDE_MODEL: claude-sonnet-4-6
        run: python scripts/programmatic_seo.py

      - name: Commit and push if changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/programmatic-seo/
          git add public/automation/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "[bot] Auto-generate programmatic SEO content [skip ci]"
          git push

